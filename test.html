<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Years of Experience Counter</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            font-size: 2em;
            color: #333;
        }
        .counter {
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="counter">
        <div>Years of Experience:</div>
        <div id="years">0</div>
    </div>

    <script>
        let years = 0;
        const target = 20;
        const increment = 0.1; // Change this value for faster or slower count
        const counterElement = document.getElementById('years');

        const interval = setInterval(() => {
            years += increment;
            if (years >= target) {
                years = target; // Ensure it doesn't go over the target
                clearInterval(interval);
            }
            counterElement.textContent = Math.floor(years); // Display the integer value
        }, 5); // Update every 100ms
    </script>
</body>
</html>
