<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card with Arrow Link</title>
<style>
  /* Basic reset */
  * {
    box-sizing: border-box;
  }

  /* Card container styling */
  .card {
    position: relative;
    width: 300px;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    background-color: #ffffff;
    overflow: hidden;
  }

  /* Content styling */
  .card-content {
    font-size: 1rem;
    color: #333;
  }

  /* Arrow link styling */
  .arrow-link {
    position: absolute;
    bottom: 16px;
    right: 16px;
    font-size: 1.5rem;
    color: #007BFF;
    text-decoration: none;
    transition: transform 0.3s ease;
  }

  .arrow-link:hover {
    transform: translateX(5px); /* Subtle movement on hover */
  }
</style>
</head>
<body>

<div class="card">
  <div class="card-content">
    <h3>Card Title</h3>
    <p>This is some text inside the card. You can add more content here as needed.</p>
  </div>
  <!-- Arrow link in bottom right corner -->
  <a href="https://example.com" class="arrow-link" target="_blank">→</a>
</div>

</body>
</html>
