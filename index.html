<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticky Header with Contact Bar</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Top Contact Bar -->
    <div class="contact-bar">
        <p style="margin-top: 2px;">Call us: +123 456 7890 | Email: info@example.com</p>
    </div>

    <!-- Sticky Header -->
    <header class="sticky-header">
        <nav class="navbar navbar-expand-md navbar-light shadow-sm">
            <div class="container d-flex  align-items-center">
                <!-- Brand Name (Left) -->
                

        
                      <!-- Centered Logo (on the left) -->
                      <div class="navbar-logo me-3"> <!-- Added margin to the right -->
                        <img src="hclogo.png" alt="Logo" class="img-fluid" style="max-height: 70px;">
                    </div>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link " href="#">Αρχική</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Σχετικά με εμάς</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Υπηρεσίες</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Επικοινωνία</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container mt-5">
        
        <!-- More content can be added here -->
    </main>

    <!-- Bootstrap 5 JS (for responsive navbar) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
