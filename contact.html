<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticky Header with Contact Bar</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

</head>
<body>

    <!-- Top Contact Bar -->
    <div class="contact-bar">
        <p>  
            <i class="fas fa-phone"></i> 
            <a href="tel:+1234567890">+123 456 7890</a> | 
            <i class="fas fa-mobile-alt"></i> 
            <a href="tel:+9876543210">+987 654 3210</a> | 
            <i class="fas fa-envelope"></i> 
            <a href="mailto:info@example.com">info@example.com</a>
    </div>

    <!-- Sticky Header -->
    <header class="sticky-header">
        <nav class="navbar navbar-expand-md navbar-light shadow-sm">
            <div class="container-fluid d-flex justify-content-between align-items-center">
                <!-- Brand Name (Left) -->
                

        
                      <!-- Centered Logo (on the left) -->
                      <div class="navbar-logo me-3"> <!-- Added margin to the right -->
                        <img src="/pictures/hclogo.png" alt="Logo" class="img-fluid">
                    </div>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="index.html">Αρχική</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="about.html">Σχετικά με εμάς</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="services.html">Υπηρεσίες</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="contact.html">Επικοινωνία</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main>
      <div class="full-width-container">
        <!-- Content goes here -->
    </div>
    
        <div class="contact_us_6">
            <div class="responsive-container-block container">
              <form class="form-box">
                <div class="container-block form-wrapper">
                  <div class="mob-text">
                    <p class="text-blk contactus-head">
                      Επικοινωνία
                    </p>
                  </div>
                  <div class="responsive-container-block" id="i2cbk">
                    <div class="responsive-cell-block wk-tab-12 wk-mobile-12 wk-desk-12 wk-ipadp-12" id="i10mt-3">
                      <p class="text-blk input-title">
                        Τηλ
                      </p>
                      <input class="input" id="ijowk-3" name="FirstName" placeholder="Εισάγετε όνομα">
                    </div>
                    <div class="responsive-cell-block wk-tab-12 wk-mobile-12 wk-desk-12 wk-ipadp-12" id="ip1yp">
                      <p class="text-blk input-title">
                        email
                      </p>
                      <input class="input" id="ipmgh-3" name="Email" placeholder="Εισάγετε email...">
                    </div>
                    <div class="responsive-cell-block wk-tab-12 wk-mobile-12 wk-desk-12 wk-ipadp-12" id="ih9wi">
                      <p class="text-blk input-title">
                        Τηλέφωνο
                      </p>
                      <input class="input" id="imgis-3" name="PhoneNumber" placeholder="Εισάγετε Τηλέφωνο...">
                    </div>
                    <div class="responsive-cell-block wk-tab-12 wk-mobile-12 wk-desk-12 wk-ipadp-12" id="i634i-3">
                      <p class="text-blk input-title">
                        Τι υπηρεσίες θα θέλατε;
                      </p>
                      <textarea class="textinput" id="i5vyy-3" placeholder="Please enter query..."></textarea>
                    </div>
                  </div>
                  <button class="submit-btn" id="w-c-s-bgc_p-1-dm-id-2">
                    Υποβολή
                  </button>
                </div>
              </form>
  
              <div class="responsive-cell-block wk-desk-7 wk-ipadp-12 wk-tab-12 wk-mobile-12" id="i772w">
                <div class="map-part">
                 
                        <p class="text-blk map-contactus-head" id="w-c-s-fc_p-1-dm-id">
                          Εξυπηρέτηση σε όλη την Αττική
                        </p>
                     
                  <p class="text-blk map-contactus-subhead">
                  </p>
                 
                  <div class="map-box container-block">

                </div>
                </div>
              </div>
            </div>
          </div>
    </main>

    <!-- Bootstrap 5 JS (for responsive navbar) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
